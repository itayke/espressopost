<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pressure-gauge ("odometer") frame: half-circle dial with three ticks at
  9 / 12 / 3 o'clock. Mirrors the kIconGauge geometry in
  components/ui/ui_report.cpp (arc radius 22, ticks 6 px long, inward).

  The needle/hand is intentionally excluded — the caller draws it
  dynamically from the live pressure reading. Stroke/fill attributes
  below are placeholders so the SVG previews; svg_to_lvgl.py ignores
  them and the caller supplies color + width at draw time.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 48 26" width="48" height="26"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round">
  <path d="M 2,24 A 22,22 0 0 1 46,24"/>
  <path d="M 2,24 L 8,24"/>
  <path d="M 24,2 L 24,8"/>
  <path d="M 46,24 L 40,24"/>
</svg>
